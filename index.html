<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control de Medicamentos - Moisés Aguilar Miranda</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --color-primario: #1a446c;
      --color-secundario: #2e7d32;
      --color-fondo: #f4f7f6;
      --color-tarjeta: #ffffff;
      --texto-principal: #333333;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--color-fondo);
      color: var(--texto-principal);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 500px;
      background: var(--color-tarjeta);
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      padding: 25px;
      text-align: center;
      margin-top: 20px;
    }

    .header img {
      width: 120px;
      height: auto;
      margin-bottom: 15px;
    }

    .header h1 {
      font-size: 1.5rem;
      color: var(--color-primario);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .header h2 {
      font-size: 1.1rem;
      color: var(--color-secundario);
      font-style: italic;
      margin-bottom: 20px;
      font-weight: 400;
    }

    .status-panel {
      background: #e8f5e9;
      color: #2e7d32;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 25px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .med-list-title {
      text-align: left;
      font-size: 1rem;
      color: #555;
      margin-bottom: 10px;
      font-weight: 600;
      border-bottom: 2px solid #eee;
      padding-bottom: 5px;
    }

    .med-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f9f9f9;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
      border-left: 4px solid var(--color-primario);
      text-align: left;
    }

    .med-info .med-name {
      font-weight: 600;
      color: var(--color-primario);
      font-size: 1rem;
    }

    .med-info .med-dose {
      font-size: 0.85rem;
      color: #666;
      margin-top: 2px;
    }

    .med-time {
      background: var(--color-primario);
      color: white;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .footer-text {
      font-size: 0.75rem;
      color: #aaa;
      margin-top: 30px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <img src="https://images.t2.ai/direct/1000093551.png" alt="Logo Control de Medicamentos">
      <h1>Control de Medicamentos</h1>
      <h2>“Moisés Aguilar Miranda”</h2>
    </div>

    <div class="status-panel">
      <span>⏰ Sistema Activo y Monitoreando en Segundo Plano</span>
    </div>

    <div class="med-list-title">Próximas Alertas Programadas</div>
    <div id="lista-medicamentos-container">
      </div>

    <p class="footer-text">© 2026 Sistema de Gestión Interna Nátiva</p>
  </div>

  <script>
    // ========================================================
    // 1. CONFIGURACIÓN DE HORARIOS Y MEDICAMENTOS (Modificable)
    // ========================================================
    const listaMedicamentos = [
      {
        nombre: "Paracetamol",
        dosis: "1 tableta de 500mg",
        hora: "08:00" // Formato militar de 24 horas (HH:MM)
      },
      {
        nombre: "Amoxicilina",
        dosis: "5 ml",
        hora: "16:00"
      },
      {
        nombre: "Vitaminas",
        dosis: "1 cápsula",
        hora: "21:30"
      }
    ];

    let ultimaAlertaDisparada = "";

    // ========================================================
    // 2. REGISTRO DEL SERVICE WORKER Y PERMISOS
    // ========================================================
    if ('serviceWorker' in navigator && 'PushManager' in window) {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('Service Worker listo y en ejecución.', reg))
        .catch(err => console.error('Error registrando Service Worker:', err));
    }

    function solicitarPermisos() {
      if ('Notification' in window) {
        Notification.requestPermission().then(permiso => {
          if (permiso === 'granted') {
            console.log('Permisos de notificación aprobados.');
          }
        });
      }
    }

    // ========================================================
    // 3. RELOJ VERIFICADOR EN TIEMPO REAL
    // ========================================================
    function iniciarRelojVerificador() {
      setInterval(() => {
        const ahora = new Date();
        const horas = String(ahora.getHours()).padStart(2, '0');
        const minutos = String(ahora.getMinutes()).padStart(2, '0');
        const horaActual = `${horas}:${minutos}`;

        if (ultimaAlertaDisparada !== horaActual) {
          const medicamentoProgramado = listaMedicamentos.find(med => med.hora === horaActual);

          if (medicamentoProgramado) {
            ultimaAlertaDisparada = horaActual; 
            enviarAlertaPush(medicamentoProgramado.nombre, medicamentoProgramado.dosis, horaActual);
          }
        }
      }, 1000); // Evalúa cada segundo
    }

    // ========================================================
    // 4. DISPARADOR DE NOTIFICACIÓN CON IMAGEN Y VIBRACIÓN
    // ========================================================
    function enviarAlertaPush(nombre, dosis, hora) {
      if (Notification.permission === 'granted' && navigator.serviceWorker.ready) {
        navigator.serviceWorker.ready.then(registration => {
          registration.showNotification(`¡Hora de Medicamento! ⏰`, {
            body: `Control: Moisés Aguilar Miranda\nHora: ${hora}\nToca tomar: ${nombre}\nDosis: ${dosis}`,
            icon: 'https://images.t2.ai/direct/1000093551.png',  
            badge: 'https://images.t2.ai/direct/1000093551.png', 
            vibrate: [300, 100, 300, 100, 400], // Patrón de vibración rítmico               
            tag: `alerta-${nombre}-${hora}`,
            renotify: true,
            data: { url: window.location.href }                
          });
        });
      }
    }

    // ========================================================
    // 5. RENDERIZADO VISUAL EN LA PÁGINA (PINTAR EN PANTALLA)
    // ========================================================
    function pintarMedicamentos() {
      const container = document.getElementById('lista-medicamentos-container');
      container.innerHTML = ""; // Limpiar contenido previo

      listaMedicamentos.forEach(med => {
        const itemHtml = `
          <div class="med-item">
            <div class="med-info">
              <div class="med-name">${med.nombre}</div>
              <div class="med-dose">${med.dosis}</div>
            </div>
            <div class="med-time">${med.hora} hrs</div>
          </div>
        `;
        container.innerHTML += itemHtml;
      });
    }

    // Ejecuciones al cargar la ventana
    window.addEventListener('load', () => {
      solicitarPermisos();
      pintarMedicamentos();
      iniciarRelojVerificador();
    });
  </script>
</body>
</html>
